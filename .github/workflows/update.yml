name: Actualizar precios
on:
  schedule:
    - cron: "5 13 * * 1-5"   # ~10:05 hora Argentina (pizarra de la manana)
    - cron: "5 16 * * 1-5"   # ~13:05 hora Argentina
    - cron: "5 18 * * 1-5"   # ~15:05 hora Argentina (cierre del dolar)
    - cron: "5 21 * * 1-5"   # ~18:05 hora Argentina (pizarra tardia)
  workflow_dispatch: {}
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install cheerio
      - run: node scrape.mjs
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Precios actualizados"
          git push
