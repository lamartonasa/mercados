name: Actualizar precios
on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install cheerio
      - run: node scrape.mjs
      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pizarra.json mercados.json historial.json
          git commit -m "Precios actualizados" || echo "sin cambios"
          git push
