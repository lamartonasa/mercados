name: Actualizar precios
on:
  # Lo dispara el Cron de Vercel (confiable) vía workflow_dispatch, con el modo:
  #   pizarra -> a la mañana (después de que cierra Rosario ~10:40)
  #   dolar   -> a la tarde (después del cierre de divisas ~15hs) + hacienda + arrend.
  # (Ya NO usamos el schedule de GitHub: es impredecible.)
  workflow_dispatch:
    inputs:
      mode:
        description: "pizarra | dolar | all"
        default: "all"
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install cheerio
      - name: Elegir modo
        id: modo
        run: |
          IN="${{ github.event.inputs.mode }}"
          echo "mode=${IN:-all}" >> "$GITHUB_OUTPUT"
      - run: node scrape.mjs ${{ steps.modo.outputs.mode }}
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Precios actualizados"
          git pull --rebase origin main || true
          git push
