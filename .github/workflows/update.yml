name: Actualizar precios
on:
  schedule:
    - cron: "45 13 * * 1-5"   # 10:45 ART - pizarra (apenas cierra Rosario 10:40) + hacienda + arrend.
    - cron: "30 14 * * 1-5"   # 11:30 ART - respaldo por si GitHub se atrasa
    - cron: "30 18 * * 1-5"   # 15:30 ART - dolar (+ hacienda + arrend.)
    - cron: "30 19 * * 1-5"   # 16:30 ART - dolar (cierre de divisas)
  workflow_dispatch: {}
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install cheerio
      - name: Elegir modo según el horario
        id: modo
        run: |
          S="${{ github.event.schedule }}"
          if [ -z "$S" ]; then
            echo "mode=all" >> "$GITHUB_OUTPUT"
          else
            case "$S" in
              "30 18 "*|"30 19 "*) echo "mode=dolar" >> "$GITHUB_OUTPUT" ;;
              *) echo "mode=pizarra" >> "$GITHUB_OUTPUT" ;;
            esac
          fi
      - run: node scrape.mjs ${{ steps.modo.outputs.mode }}
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Precios actualizados"
          git pull --rebase origin main || true
          git push
