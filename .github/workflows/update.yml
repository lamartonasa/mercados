name: Actualizar precios
on:
  schedule:
    # Pizarra (Rosario cierra ~10:40 ART). Varios horarios a minutos "raros":
    # GitHub atrasa/saltea mucho las tareas programadas, así hay más chances de
    # que al menos una se dispare cada mañana.
    - cron: "47 13 * * 1-5"   # 10:47 ART
    - cron: "23 14 * * 1-5"   # 11:23 ART
    - cron: "7 15 * * 1-5"    # 12:07 ART
    - cron: "3 16 * * 1-5"    # 13:03 ART
    # Dólar + hacienda + arrendamientos a la tarde (con el cierre).
    - cron: "33 18 * * 1-5"   # 15:33 ART
    - cron: "33 19 * * 1-5"   # 16:33 ART
  workflow_dispatch: {}
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install cheerio
      - name: Elegir modo según el horario
        id: modo
        run: |
          S="${{ github.event.schedule }}"
          if [ -z "$S" ]; then
            echo "mode=all" >> "$GITHUB_OUTPUT"
          else
            case "$S" in
              "33 18 "*|"33 19 "*) echo "mode=dolar" >> "$GITHUB_OUTPUT" ;;
              *) echo "mode=pizarra" >> "$GITHUB_OUTPUT" ;;
            esac
          fi
      - run: node scrape.mjs ${{ steps.modo.outputs.mode }}
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Precios actualizados"
          git pull --rebase origin main || true
          git push
